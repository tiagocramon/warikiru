<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body
  style="margin:0;padding:0;background-color:#101116;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#101116;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="max-width:480px;width:100%;">
          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <span style="font-size:28px;color:#F5F7FA;font-weight:700;">割り切る</span>
              <br>
              <span style="font-size:13px;color:#A7ADBA;letter-spacing:0.05em;">warikiru</span>
            </td>
          </tr>
          <!-- Card -->
          <tr>
            <td align="center"
              style="background-color:#16171D;border-radius:16px;padding:40px 32px;text-align:center;">
              <h1 style="margin:0 0 8px;font-size:24px;font-weight:600;color:#F5F7FA;">
                Código de verificação
              </h1>
              <p style="margin:0 0 32px;font-size:15px;line-height:1.6;color:#A7ADBA;">
                Use o código abaixo para confirmar sua identidade. Ele expira em breve.
              </p>
              <!-- Code -->
              <div
                style="background-color:#1C1D25;border-radius:8px;padding:20px;font-size:32px;font-weight:700;letter-spacing:0.2em;color:#F5C249;">
                {{ .Token }}
              </div>
              <!-- Divider -->
              <hr style="border:none;border-top:1px solid #1C1D25;margin:32px 0;">
              <p style="margin:0;font-size:13px;line-height:1.5;color:#7C8394;">
                Se você não solicitou este código, pode ignorar este e-mail.
              </p>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top:24px;">
              <p style="margin:0;font-size:12px;color:#7C8394;">
                © 2026 Warikiru. Todos os direitos reservados.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>

</html>
